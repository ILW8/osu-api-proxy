name = "osu-api-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Uncomment to use a custom domain instead of *.workers.dev:
# routes = [
#   { pattern = "osu-proxy.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

[observability]
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "UpstreamRateLimiter" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UpstreamRateLimiter"]

# Optional: route upstream requests through your own egress proxy instead of
# Cloudflare's IP pool. Set both to enable.
# [vars]
# OSU_ORIGIN = "http://<your-entry-server-ip>:8080"
# UPSTREAM_PROXY_SECRET = "a-per-user-secret-from-users.map"
