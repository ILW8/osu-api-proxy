version: "3.8"

services:
  entry:
    image: ${REGISTRY:-localhost:5000}/osu-proxy-entry:latest
    ports:
      - "8080:8080"
    environment:
      - UPSTREAM_PROXY_SECRET=${UPSTREAM_PROXY_SECRET:?UPSTREAM_PROXY_SECRET must be set}
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.public == true
    networks:
      - proxy

  worker:
    image: ${REGISTRY:-localhost:5000}/osu-proxy-worker:latest
    deploy:
      mode: global
    networks:
      - proxy

networks:
  proxy:
    driver: overlay
