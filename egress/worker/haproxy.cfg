global
    log stdout format raw local0 info
    log /dev/log local0 info
    maxconn 1024

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  30s
    timeout server  60s

# Prometheus metrics
frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    no log

# Global rate limit (single counter shared by all requests on this worker)
backend global_rates
    stick-table type string len 8 size 10 expire 120s store http_req_rate(60s)

frontend worker
    bind *:8081

    # Track all requests under a fixed key
    http-request track-sc0 str(global) table global_rates

    # Deny if global rate exceeds threshold (120 sustained + 10 burst = 130)
    http-request deny deny_status 429 if { sc_http_req_rate(0,global_rates) gt 130 }

    default_backend osu_upstream

backend osu_upstream
    http-request set-header Host osu.ppy.sh
    http-request del-header X-Upstream-Proxy-Secret
    server osu osu.ppy.sh:443 ssl verify required ca-file /etc/ssl/certs/ca-certificates.crt sni str(osu.ppy.sh) resolvers docker_dns resolve-prefer ipv4 init-addr last,libc,none

resolvers docker_dns
    nameserver dns 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold valid 30s
    accepted_payload_size 8192
