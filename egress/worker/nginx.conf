worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;

    # Global rate limit: 120 req/min across all requests on this worker
    limit_req_zone $server_name zone=global:1m rate=120r/m;
    limit_req_status 429;

    server {
        listen 8081;

        location / {
            limit_req zone=global burst=10 nodelay;

            proxy_pass https://osu.ppy.sh;
            proxy_set_header Host osu.ppy.sh;
            proxy_ssl_server_name on;

            # Strip proxy-internal header before forwarding to osu
            proxy_set_header X-Upstream-Proxy-Secret "";
        }
    }
}
